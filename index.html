<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMS · RISE 성과관리시스템</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
:root{
  --bg:#f4f6fb;--surface:#fff;--surface2:#f8f9fc;
  --text:#1a1d2e;--text2:#6b7280;--text3:#9ca3af;
  --border:#e5e7eb;--border2:#d1d5db;
  --primary:#185fa5;--primary-h:#1470bc;--primary-l:#e6f1fb;
  --green:#0f6e56;--green-l:#e1f5ee;
  --orange:#854f0b;--orange-l:#faeeda;
  --purple:#534ab7;--purple-l:#eeedfe;
  --red:#a32d2d;--red-l:#fcebeb;
  --r-sm:5px;--r-md:8px;--r-lg:12px;--r-xl:16px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --font:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0f2d4f 0%,#185fa5 50%,#0f6e56 100%);display:flex;align-items:center;justify-content:center;z-index:9000}
.login-box{background:#fff;border-radius:var(--r-xl);padding:40px 36px;width:380px;max-width:95vw;box-shadow:var(--shadow-lg)}
.login-logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#185fa5,#0f6e56);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;margin:0 auto 16px}
.login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{text-align:center;font-size:12px;color:var(--text2);margin-bottom:28px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.login-field input{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:var(--r-md);font-size:13.5px;font-family:var(--font);color:var(--text);transition:border-color .15s}
.login-field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
.login-btn{width:100%;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-md);font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;margin-top:4px;transition:background .15s}
.login-btn:hover{background:var(--primary-h)}
#loginError{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.6}
/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#185fa5,#0f6e56);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;flex-shrink:0}
.tb-name{font-size:14px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:10px}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer}
.user-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.role-badge{padding:1px 7px;border-radius:10px;font-size:10.5px;font-weight:500}
.rb-master{background:#faeeda;color:#633806}
.rb-professor{background:#eeedfe;color:#3c3489}
.rb-staff{background:var(--primary-l);color:#0c447c}
/* ── MAIN ── */
.main{max-width:1280px;margin:0 auto;padding:20px 24px 60px}
/* ── NAV ── */
.nav{display:flex;gap:1px;border-bottom:1px solid var(--border);margin-bottom:1.3rem;overflow-x:auto}
.nb{padding:9px 14px;background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-size:12.5px;color:var(--text2);font-family:var(--font);white-space:nowrap;transition:color .15s}
.nb:hover{color:var(--text)}
.nb.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
.sub-nav{display:flex;gap:5px;margin-bottom:13px}
.snb{padding:5px 13px;border:1px solid var(--border2);border-radius:20px;background:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:var(--font);transition:all .15s}
.snb.on{background:var(--primary);color:#fff;border-color:var(--primary)}
/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.1rem}
@media(max-width:640px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--surface);border-radius:var(--r-lg);padding:14px 16px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.kv{font-size:22px;font-weight:600;margin-bottom:2px}
.kl{font-size:11.5px;color:var(--text2)}
/* ── TOOLBAR ── */
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:6px;flex-wrap:wrap}
.frow{display:flex;gap:4px;flex-wrap:wrap}
.fb{padding:5px 11px;border:1px solid var(--border2);border-radius:20px;background:none;cursor:pointer;font-size:11.5px;color:var(--text2);font-family:var(--font);transition:all .15s}
.fb:hover{border-color:var(--primary);color:var(--primary)}
.fb.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn{padding:7px 14px;border:none;border-radius:var(--r-md);cursor:pointer;font-size:12px;font-family:var(--font);display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-weight:500}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:var(--r-sm)}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#0d5f49}
/* ── CARD ── */
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.sc.ov{overflow:hidden}
.sch{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:1px solid var(--border)}
.sct{font-size:13px;font-weight:600}
.scb{padding:11px 15px}
/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tbl th{padding:8px 9px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500;font-size:11px;text-align:left;background:var(--surface2)}
.tbl td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#fafbff}
/* ── BADGE ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:500;white-space:nowrap}
.bd{background:#eaf3de;color:#3b6d11}.bi{background:var(--primary-l);color:#0c447c}
.bl{background:var(--red-l);color:var(--red)}.bp{background:var(--orange-l);color:var(--orange)}
.bq{background:var(--purple-l);color:#3c3489}.bql{background:var(--green-l);color:#085041}
.ba{background:#f1efe8;color:#5f5e5a}
/* ── PROGRESS ── */
.pw{display:flex;align-items:center;gap:6px}
.pb{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px}
.pt{font-size:11px;color:var(--text2);min-width:28px;text-align:right}
.minibar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:3px 0}
.mbf{height:100%;border-radius:3px}
/* ── ICON BUTTONS ── */
.ib{background:none;border:none;cursor:pointer;padding:3px 4px;border-radius:5px;font-size:14px;transition:all .15s;line-height:1}
.ib-edit{color:var(--text3)}.ib-edit:hover{color:var(--primary);background:var(--primary-l)}
.ib-del{color:var(--text3)}.ib-del:hover{color:var(--red);background:var(--red-l)}
.ib-green{color:var(--text3)}.ib-green:hover{color:var(--green);background:var(--green-l)}
/* ── BUDGET ── */
.bsplit{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
@media(max-width:640px){.bsplit{grid-template-columns:1fr}}
.bsc{border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.bscm{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:12px 14px}
.bscmv{font-size:15px;font-weight:600;text-align:center}
.bscml{font-size:10.5px;color:var(--text2);text-align:center;margin-top:1px}
/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:.5rem}
.cal-hdr{padding:6px;text-align:center;font-size:11px;font-weight:600;color:var(--text2)}
.cal-cell{min-height:78px;padding:5px;border:1px solid var(--border);border-radius:6px;background:var(--surface)}
.cal-cell.other{background:var(--surface2);opacity:.5}
.cal-cell.today{border-color:var(--primary);border-width:2px}
.cal-dn{font-size:11px;font-weight:400;color:var(--text2);margin-bottom:3px}
.cal-dn.today{color:var(--primary);font-weight:700}
.cal-dot{font-size:10px;padding:1px 5px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* ── WEEK ── */
.wk-nav{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--r-lg);padding:10px 15px;margin-bottom:1rem;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.wk-label{flex:1;text-align:center;font-size:13.5px;font-weight:500}
.wnb{background:none;border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;padding:5px 12px;font-size:12px;color:var(--text2);font-family:var(--font)}
.wnb:hover{border-color:var(--primary);color:var(--primary)}
.wk-day{border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;background:var(--surface)}
.wk-day-hd{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.wk-item{display:flex;align-items:center;gap:8px;padding:7px 14px;border-top:1px solid var(--border);font-size:12.5px}
.wk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* ── WEEKLY REPORT ── */
.wu-block{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:.8rem;background:var(--surface)}
.wu-hd{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.wu-body{display:flex;padding:11px 15px;gap:0}
.wu-half{flex:1;min-width:0}
.wu-htitle{font-size:11.5px;font-weight:500;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.wu-item{display:flex;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.wu-item:last-child{border-bottom:none}
.wu-div{width:1px;background:var(--border);margin:0 12px;align-self:stretch}
.wu-empty{font-size:11.5px;color:var(--text3);font-style:italic;padding:8px 0}
/* ── REPORT ── */
.rs-done{background:var(--green-l);color:#085041}
.rs-ing{background:var(--primary-l);color:#0c447c}
.rs-fb{background:var(--orange-l);color:var(--orange)}
/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1d2e;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;z-index:9999;transition:transform .3s ease;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1000;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border-radius:var(--r-xl);width:500px;max-width:97vw;border:1px solid var(--border2);max-height:93vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.mhd{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.mhd span{font-size:14px;font-weight:600}
.mhd button{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text2);line-height:1;padding:2px}
.mbd{padding:16px 18px}
.mft{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgf{grid-column:1/-1}
.fl{font-size:11.5px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r-md);font-size:13px;font-family:var(--font);background:var(--surface2);color:var(--text);transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l);background:var(--surface)}
.mcx{padding:8px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);cursor:pointer;font-size:12.5px;font-family:var(--font);color:var(--text2)}
.mok{padding:8px 18px;background:var(--primary);border:none;border-radius:var(--r-md);cursor:pointer;font-size:12.5px;font-family:var(--font);color:#fff;font-weight:500}
.mok:hover{background:var(--primary-h)}
/* ── FILE ATTACH ── */
.file-drop{border:2px dashed var(--border2);border-radius:var(--r-md);padding:18px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface2)}
.file-drop:hover,.file-drop.drag{border-color:var(--primary);background:var(--primary-l)}
.file-drop input{display:none}
.file-list{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.file-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px}
.file-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--primary)}
.file-item-size{font-size:10.5px;color:var(--text3)}
/* ── USER MANAGEMENT ── */
.user-card{display:flex;align-items:center;gap:12px;padding:12px 15px;border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:8px;background:var(--surface)}
.user-card-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.user-card-info{flex:1;min-width:0}
.user-card-name{font-size:13px;font-weight:500}
.user-card-sub{font-size:11px;color:var(--text2);margin-top:1px}
/* ── DROPDOWN ── */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{display:none;position:absolute;right:0;top:calc(100%+6px);background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-md);box-shadow:var(--shadow-lg);min-width:160px;z-index:500}
.dropdown-menu.show{display:block}
.dm-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:12.5px;cursor:pointer;color:var(--text);transition:background .1s}
.dm-item:hover{background:var(--surface2)}
.dm-item.danger{color:var(--red)}
.dm-item.danger:hover{background:var(--red-l)}
.dm-sep{height:1px;background:var(--border);margin:4px 0}
/* ── ACTION BUTTONS (항상 보임) ── */
.abtn{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:5px;font-size:12px;font-family:var(--font);cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s;border:1px solid transparent}
.abtn-edit{background:#e6f1fb;color:#185fa5;border-color:#b8d4f0}
.abtn-edit:hover{background:#185fa5;color:#fff}
.abtn-del{background:#fcebeb;color:#a32d2d;border-color:#f0b8b8}
.abtn-del:hover{background:#a32d2d;color:#fff}
.abtn-green{background:#e1f5ee;color:#0f6e56;border-color:#a8dece}
.abtn-green:hover{background:#0f6e56;color:#fff}
.abtn-wrap{display:flex;gap:4px;flex-wrap:wrap}
/* ── DELAY REASON ── */
.delay-reason{font-size:11px;color:#a32d2d;background:#fcebeb;border-radius:4px;padding:2px 7px;margin-top:3px;display:inline-block}
/* ── PERMISSION HINT ── */
.perm-hint{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--orange-l);border-radius:var(--r-md);font-size:12px;color:var(--orange);margin-bottom:10px}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══════════════════════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">A</div>
    <div class="login-title">AIMS</div>
    <div class="login-sub">RISE 미래인재개발팀 성과관리시스템<br>인천대학교</div>
    <div class="login-field">
      <label>아이디 (이메일)</label>
      <input type="text" id="loginId" placeholder="아이디를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div id="loginError"></div>
    <div class="login-hint">
      마스터 계정: <strong>admin</strong> / <strong>rise2026!</strong><br>
      최초 로그인 후 마스터 페이지에서 계정을 추가하세요
    </div>
  </div>
</div>

<!-- ══ TOPBAR ════════════════════════════════════ -->
<div class="topbar" id="topbar" style="display:none">
  <div class="tb-brand">
    <div class="tb-logo">A</div>
    <div>
      <div class="tb-name">AIMS · 성과관리시스템</div>
    </div>
  </div>
  <div class="tb-right">
    <div id="dateLabel" style="font-size:11.5px;color:var(--text2)"></div>
    <div class="dropdown">
      <div class="user-chip" id="userChip" onclick="toggleDropdown()">
        <div class="user-avatar" id="userAvatarTop"></div>
        <span id="userNameTop"></span>
        <span class="role-badge" id="userRoleBadge"></span>
        <i class="ti ti-chevron-down" style="font-size:11px;color:var(--text3)"></i>
      </div>
      <div class="dropdown-menu" id="userDropdown">
        <div class="dm-item" onclick="closeDropdown();openMyPage()"><i class="ti ti-user"></i> 내 정보</div>
        <div class="dm-item" id="adminMenuBtn" onclick="closeDropdown();openAdminPage()" style="display:none"><i class="ti ti-shield"></i> 사용자 관리</div>
        <div class="dm-sep"></div>
        <div class="dm-item danger" onclick="doLogout()"><i class="ti ti-logout"></i> 로그아웃</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MAIN ══════════════════════════════════════ -->
<div class="main" id="mainApp" style="display:none">
  <div class="nav">
    <button class="nb on" onclick="go('task')"><i class="ti ti-clipboard-list"></i> 업무추진</button>
    <button class="nb" onclick="go('ind')"><i class="ti ti-target"></i> 성과지표</button>
    <button class="nb" onclick="go('bud')"><i class="ti ti-coin"></i> 예산관리</button>
    <button class="nb" onclick="go('personal')"><i class="ti ti-folder"></i> 개인업무</button>
    <button class="nb" onclick="go('schedule')"><i class="ti ti-calendar"></i> 사업일정</button>
    <button class="nb" onclick="go('report')"><i class="ti ti-chart-bar"></i> 실적보고</button>
  </div>
  <div id="tab-task"></div>
  <div id="tab-ind" style="display:none"></div>

<script>
// ══════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════
const UNITS=['1-1','1-2','1-3','2-1'];
const UN={'1-1':'전략산업 융합','1-2':'스마트모빌리티','1-3':'i-Union 창업','2-1':'AI 인재양성'};
const UC={'1-1':'#185fa5','1-2':'#0f6e56','1-3':'#854f0b','2-1':'#534ab7'};
const CC={'인건비':'#185fa5','연구활동비':'#0f6e56','교육훈련비':'#534ab7','장비재료비':'#854f0b','간접비':'#73726c','기타':'#993c1d'};
const DTYPE_C={'사업계획안':'#185fa5','결과보고':'#0f6e56','일반지출':'#854f0b','문서관리':'#534ab7','기타':'#73726c'};
const RTYPE_C={'사업단 주간보고':'#185fa5','기획처 주간보고':'#0f6e56','TP 월간보고':'#854f0b','실적보고서':'#534ab7','기타':'#73726c'};
const ROLE_LABEL={'master':'마스터','professor':'교수','staff':'실무진'};
const ROLE_CLS={'master':'rb-master','professor':'rb-professor','staff':'rb-staff'};
const AVATAR_BG={'master':'#633806','professor':'#534ab7','staff':'#185fa5'};
const BASE_MON=new Date(2026,4,25);
const BASE_WEEK=22;

// ══════════════════════════════════════════════════
//  AUTH / USER MANAGEMENT
// ══════════════════════════════════════════════════
const DEFAULT_USERS=[
  {id:'admin',name:'관리자',pw:'rise2026!',role:'master',isAdmin:true}
];

function getUsers(){try{const v=localStorage.getItem('aims_users');return v?JSON.parse(v):[...DEFAULT_USERS];}catch{return[...DEFAULT_USERS];}}
function saveUsers(u){localStorage.setItem('aims_users',JSON.stringify(u));}
function initUsers(){if(!localStorage.getItem('aims_users'))saveUsers([...DEFAULT_USERS]);}

let currentUser=null;

function doLogin(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  const users=getUsers();
  const u=users.find(x=>x.id===id&&x.pw===pw);
  if(!u){document.getElementById('loginError').textContent='아이디 또는 비밀번호가 잘못되었습니다.';return;}
  currentUser=u;
  sessionStorage.setItem('aims_session',JSON.stringify(u));
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('loginError').textContent='';
  renderUserInfo();
  go('task');
}

function doLogout(){
  sessionStorage.removeItem('aims_session');
  currentUser=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('topbar').style.display='none';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
}

function renderUserInfo(){
  if(!currentUser)return;
  const av=document.getElementById('userAvatarTop');
  av.style.background=AVATAR_BG[currentUser.role]||'#185fa5';
  av.textContent=currentUser.name.charAt(0);
  document.getElementById('userNameTop').textContent=currentUser.name;
  const rb=document.getElementById('userRoleBadge');
  rb.textContent=ROLE_LABEL[currentUser.role];
  rb.className='role-badge '+ROLE_CLS[currentUser.role];
  // show admin menu for master
  document.getElementById('adminMenuBtn').style.display=currentUser.role==='master'?'flex':'none';
}

// Admin permission check
function isAdmin(){return currentUser&&(currentUser.role==='master'||(currentUser.isAdmin===true));}
function isMaster(){return currentUser&&currentUser.role==='master';}

function openMyPage(){
  if(!currentUser)return;
  document.getElementById('myPageAvatar').style.background=AVATAR_BG[currentUser.role]||'#185fa5';
  document.getElementById('myPageAvatar').textContent=currentUser.name.charAt(0);
  document.getElementById('myPageName').textContent=currentUser.name;
  const b=document.getElementById('myPageBadge');
  b.innerHTML=`<span class="role-badge ${ROLE_CLS[currentUser.role]}">${ROLE_LABEL[currentUser.role]}</span>${currentUser.isAdmin&&currentUser.role!=='master'?'&nbsp;<span class="badge bi">관리자 권한</span>':''}`;
  document.getElementById('mp_name').value=currentUser.name;
  document.getElementById('mp_oldpw').value='';
  document.getElementById('mp_newpw').value='';
  document.getElementById('mp_newpw2').value='';
  om('mMyPage');
}

function svMyPage(){
  const name=document.getElementById('mp_name').value.trim();
  const oldpw=document.getElementById('mp_oldpw').value;
  const newpw=document.getElementById('mp_newpw').value;
  const newpw2=document.getElementById('mp_newpw2').value;
  if(!name){showToast('이름을 입력하세요');return;}
  const users=getUsers();
  const idx=users.findIndex(u=>u.id===currentUser.id);
  if(idx<0)return;
  if(newpw){
    if(oldpw!==users[idx].pw){showToast('현재 비밀번호가 틀립니다');return;}
    if(newpw!==newpw2){showToast('새 비밀번호가 일치하지 않습니다');return;}
    if(newpw.length<6){showToast('비밀번호는 6자 이상이어야 합니다');return;}
    users[idx].pw=newpw;
  }
  users[idx].name=name;
  saveUsers(users);
  currentUser={...users[idx]};
  sessionStorage.setItem('aims_session',JSON.stringify(currentUser));
  renderUserInfo();
  cm('mMyPage');
  showToast('저장되었습니다');
}

function openAdminPage(){
  renderAdminUserList();
  om('mAdmin');
}

function renderAdminUserList(){
  const users=getUsers();
  let h='';
  users.forEach(u=>{
    const isSelf=u.id===currentUser.id;
    const adminBadge=u.isAdmin&&u.role!=='master'?'<span class="badge bi" style="margin-left:4px">관리자</span>':'';
    h+=`<div class="user-card">
      <div class="user-card-avatar" style="background:${AVATAR_BG[u.role]||'#185fa5'}">${u.name.charAt(0)}</div>
      <div class="user-card-info">
        <div class="user-card-name">${u.name} ${isSelf?'<span style="font-size:10.5px;color:var(--text3)">(나)</span>':''} ${adminBadge}</div>
        <div class="user-card-sub">@${u.id} · <span class="role-badge ${ROLE_CLS[u.role]}">${ROLE_LABEL[u.role]}</span></div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${u.role!=='master'&&!isSelf?`<button class="btn btn-sm ${u.isAdmin?'btn-outline':'btn-primary'}" onclick="toggleAdmin('${u.id}')" title="${u.isAdmin?'관리자 권한 해제':'관리자 권한 부여'}">${u.isAdmin?'<i class="ti ti-shield-off"></i> 권한 해제':'<i class="ti ti-shield-check"></i> 권한 부여'}</button>`:''}
        ${u.role!=='master'&&!isSelf?`<button class="abtn abtn-del" onclick="deleteUser('${u.id}')"><i class="ti ti-trash"></i></button>`:''}
      </div>
    </div>`;
  });
  document.getElementById('adminUserList').innerHTML=h;
}

function addUser(){
  const name=document.getElementById('nu_name').value.trim();
  const id=document.getElementById('nu_id').value.trim();
  const pw=document.getElementById('nu_pw').value;
  const role=document.getElementById('nu_role').value;
  if(!name||!id||!pw){showToast('모든 항목을 입력하세요');return;}
  const users=getUsers();
  if(users.find(u=>u.id===id)){showToast('이미 존재하는 아이디입니다');return;}
  users.push({id,name,pw,role,isAdmin:false});
  saveUsers(users);
  ['nu_name','nu_id','nu_pw'].forEach(x=>document.getElementById(x).value='');
  renderAdminUserList();
  showToast(`${name} 계정이 추가되었습니다`);
}

function toggleAdmin(uid){
  const users=getUsers();
  const idx=users.findIndex(u=>u.id===uid);
  if(idx<0)return;
  users[idx].isAdmin=!users[idx].isAdmin;
  saveUsers(users);
  renderAdminUserList();
  showToast(users[idx].isAdmin?'관리자 권한을 부여했습니다':'관리자 권한을 해제했습니다');
}

function deleteUser(uid){
  if(!confirm('이 계정을 삭제하시겠습니까?'))return;
  let users=getUsers();
  users=users.filter(u=>u.id!==uid);
  saveUsers(users);
  renderAdminUserList();
  showToast('계정이 삭제되었습니다');
}

    });

        <div class="wu-htitle"><span style="color:#0f6e56"><i class="ti ti-calendar-event"></i> 차주 계획</span><button class="btn btn-sm btn-outline" style="color:#0f6e56;border-color:#0f6e56" onclick="opWkEdit('${u}','nextWeek')"><i class="ti ti-plus"></i></button></div>`;

function getAllItems(){
  const out=[];
  tasks.forEach(t=>out.push({date:t.due,label:t.title,unit:t.unit,color:UC[t.unit]||'#185fa5',src:'task'}));
  reports.forEach(r=>out.push({date:r.due,label:r.rtype+': '+r.title,unit:'전체',color:'#534ab7',src:'report'}));
  events.forEach(e=>out.push({date:e.date,label:e.title,unit:e.unit,color:UC[e.unit]||'#185fa5',eid:e.id,src:'event'}));
  return out;
}

function rtWeekCal(){
  const mon=new Date(BASE_MON);mon.setDate(BASE_MON.getDate()+weekOff*7);
  const days=['월','화','수','목','금','토','일'];
  const all=getAllItems();const today='2026-05-27';
  let h=`<div class="wk-nav"><button class="wnb" onclick="weekOff--;rtSched()">← 이전</button><span class="wk-label">${getWkLabel(weekOff)}</span><button class="wnb" onclick="weekOff++;rtSched()">다음 →</button></div>`;
  for(let d=0;d<7;d++){
    const dt=new Date(mon);dt.setDate(mon.getDate()+d);
    const ds=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const di=all.filter(i=>i.date===ds);const isT=ds===today;
    h+=`<div class="wk-day"><div class="wk-day-hd"><span style="font-size:13px;font-weight:${isT?'700':'400'};color:${isT?'#185fa5':'var(--text)'}">${days[d]} ${dt.getMonth()+1}/${dt.getDate()}${isT?' ✦':''}</span><span style="font-size:11.5px;color:var(--text2)">${di.length}건</span></div>`;
    if(!di.length)h+=`<div style="padding:7px 14px;font-size:12px;color:var(--text3);font-style:italic">일정 없음</div>`;
    di.forEach(it=>h+=`<div class="wk-item"><span class="wk-dot" style="background:${it.color}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${it.label}">${it.label}</span><span style="font-size:10.5px;color:${it.color};background:${it.color}18;padding:1px 7px;border-radius:10px;flex-shrink:0">${it.unit}</span>${it.src==='event'?`<button class="abtn abtn-del" style="padding:3px 7px" onclick="delEvt(${it.eid})"><i class="ti ti-trash"></i></button>`:''}</div>`);
    h+=`</div>`;
  }
  return h;
}

function rtMonthCal(){
  const bd=new Date(2026,4+monthOff,1);const yr=bd.getFullYear(),mo=bd.getMonth();
  const mN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const all=getAllItems();const today='2026-05-27';
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button class="wnb" onclick="monthOff--;rtSched()">← 이전</button><span style="font-size:15px;font-weight:600">${yr}년 ${mN[mo]}</span><button class="wnb" onclick="monthOff++;rtSched()">다음 →</button></div>
  <div class="cal-grid">`;
  ['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="cal-hdr">${d}</div>`);
  let cells=[];for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  while(cells.length%7)cells.push(null);
  cells.forEach(d=>{
    if(!d){h+=`<div class="cal-cell other"></div>`;return;}
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const di=all.filter(i=>i.date===ds);const isT=ds===today;
    h+=`<div class="cal-cell${isT?' today':''}"><div class="cal-dn${isT?' today':''}">${d}</div>`;
    di.slice(0,3).forEach(it=>h+=`<div class="cal-dot" style="background:${it.color}18;color:${it.color}" title="${it.label}">${it.label}</div>`);
    if(di.length>3)h+=`<div style="font-size:9.5px;color:var(--text3);padding:1px 3px">+${di.length-3}건</div>`;
    h+=`</div>`;
  });
  h+=`</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--text2)">${UNITS.map(u=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${UC[u]};display:inline-block"></span>${u} ${UN[u]}</span>`).join('')}</div>`;
  return h;
}

// ══════════════════════════════════════════════════
//  FILE HANDLING
// ══════════════════════════════════════════════════
function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(f.size>5*1024*1024){showToast(`${f.name}: 5MB 초과`,`error`);return;}
    const reader=new FileReader();
    reader.onload=e=>{
      pendingFiles.push({name:f.name,size:f.size,type:f.type,data:e.target.result});
      renderFileList();
    };
    reader.readAsDataURL(f);
  });
}
function renderFileList(){
  const list=document.getElementById('attachedFileList');
  if(!list)return;
  list.innerHTML=pendingFiles.map((f,i)=>`
    <div class="file-item">
      <i class="ti ti-file" style="color:#185fa5;flex-shrink:0"></i>
      <span class="file-item-name">${f.name}</span>
      <span class="file-item-size">${fmtBytes(f.size)}</span>
      <button class="ib ib-del" onclick="pendingFiles.splice(${i},1);renderFileList()"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function fileDragOver(e){e.preventDefault();document.getElementById('fileDropZone').classList.add('drag');}
function fileDragLeave(e){document.getElementById('fileDropZone').classList.remove('drag');}
function fileDrop(e){e.preventDefault();fileDragLeave();handleFiles(e.dataTransfer.files);}
function viewFiles(docId){
  const d=dokuments.find(x=>x.id===docId);
  if(!d||!d.files||!d.files.length){showToast('첨부 파일 없음');return;}
  d.files.forEach(f=>{
    const a=document.createElement('a');a.href=f.data;a.download=f.name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  });
}

function svTask(){
  const unit=document.getElementById('t_unit').value,field=document.getElementById('t_field').value,title=document.getElementById('t_title').value.trim(),who=document.getElementById('t_who').value.trim(),due=document.getElementById('t_due').value,stat=document.getElementById('t_stat').value,type=document.getElementById('t_type').value,iid=type==='정량지표'?document.getElementById('t_ind').value:'',delayReason=document.getElementById('t_delay').value.trim();
  const prog=stat==='완료'?100:stat==='예정'?0:(editingTask?tasks.find(t=>t.id===editingTask)?.prog||0:0);
  if(!title||!who)return;
  if(editingTask){const idx=tasks.findIndex(t=>t.id===editingTask);if(idx>-1)tasks[idx]={...tasks[idx],unit,field,title,who,due,stat,prog,type,iid,delayReason};}
  else tasks.push({id:Date.now(),unit,field,title,who,ownerId:currentUser?.id||'admin',due,stat,prog,type,iid,delayReason});
  sv('tasks',tasks);cm('mTask');rtTask();showToast('업무가 저장되었습니다');
}

function svInd(){
  const idx=indicators.findIndex(i=>i.id===editingInd);
  if(idx>-1){indicators[idx].t26=parseFloat(document.getElementById('i_tgt').value)||0;indicators[idx].a26=parseFloat(document.getElementById('i_act').value)||0;}
  sv('indicators',indicators);cm('mInd');rtInd();showToast('실적이 저장되었습니다');
}

function svBud(){
  const unit=document.getElementById('b_unit').value,btype=document.getElementById('b_btype').value,cat=document.getElementById('b_cat').value,name=document.getElementById('b_name').value.trim(),al=parseInt(document.getElementById('b_al').value)||0,ex=parseInt(document.getElementById('b_ex').value)||0;
  if(!name)return;
  if(editingBud){const idx=budget.findIndex(b=>b.id===editingBud);if(idx>-1)budget[idx]={...budget[idx],unit,btype,cat,name,al,ex};}
  else budget.push({id:Date.now(),unit,btype,cat,name,al,ex});
  sv('budget',budget);cm('mBud');rtBud();showToast('저장되었습니다');
}

function svDoc(){
  const dtype=document.getElementById('d_type').value,unit=document.getElementById('d_unit').value,title=document.getElementById('d_title').value.trim(),date=document.getElementById('d_date').value,who=document.getElementById('d_who').value.trim(),stat=document.getElementById('d_stat').value;
  if(!title)return;
  if(editingDoc){const idx=dokuments.findIndex(d=>d.id===editingDoc);if(idx>-1)dokuments[idx]={...dokuments[idx],dtype,unit,title,date,who,stat,files:[...pendingFiles]};}
  else dokuments.push({id:Date.now(),dtype,unit,title,date,who,ownerId:currentUser?.id||'admin',stat,files:[...pendingFiles]});
  sv('dokuments',dokuments);cm('mDoc');rtPersonal();showToast('기안이 저장되었습니다');
}

function svRpt(){
  const rtype=document.getElementById('r_type').value,wkKey=document.getElementById('r_wk').value.trim(),title=document.getElementById('r_title').value.trim(),due=document.getElementById('r_due').value,who=document.getElementById('r_who').value.trim(),stat=document.getElementById('r_stat').value;
  if(!title)return;
  if(editingRpt){const idx=reports.findIndex(r=>r.id===editingRpt);if(idx>-1)reports[idx]={...reports[idx],rtype,wkKey,title,due,who,stat};}
  else reports.push({id:Date.now(),rtype,wkKey,title,due,who,ownerId:currentUser?.id||'admin',stat});
  sv('reports',reports);cm('mRpt');rtPersonal();showToast('저장되었습니다');
}

function svEvt(){
  const title=document.getElementById('e_title').value.trim(),date=document.getElementById('e_date').value,unit=document.getElementById('e_unit').value,etype=document.getElementById('e_etype').value,who=document.getElementById('e_who').value.trim(),memo=document.getElementById('e_memo').value.trim();
  if(!title||!date)return;
  if(editingEvt){const idx=events.findIndex(e=>e.id===editingEvt);if(idx>-1)events[idx]={...events[idx],title,date,unit,etype,who,memo};}
  else events.push({id:Date.now(),title,date,unit,etype,who,memo});
  sv('events',events);cm('mEvt');rtSched();showToast('일정이 저장되었습니다');
}

function svWk(){
  const key=getWkKey(weekOff);ensureWk(key);
  const unit=document.getElementById('wk_unit').value,sec=document.getElementById('wk_sec').value,text=document.getElementById('wk_txt').value.trim(),who=document.getElementById('wk_who').value.trim(),type=document.getElementById('wk_type').value;
  if(!text)return;
  if(editingWk){const idx=weeklyData[key][unit][sec].findIndex(i=>i.id===editingWk);if(idx>-1)weeklyData[key][unit][sec][idx]={...weeklyData[key][unit][sec][idx],text,who,type};}
  else weeklyData[key][unit][sec].push({id:Date.now(),text,who,ownerId:currentUser?.id||'admin',type});
  sv('weeklyData',weeklyData);cm('mWk');rtPersonal();showToast('저장되었습니다');
}

// ══════════════════════════════════════════════════
//  DELETERS
// ══════════════════════════════════════════════════
function delTask(id){if(confirm('삭제하시겠습니까?')){tasks=tasks.filter(t=>t.id!==id);sv('tasks',tasks);rtTask();}}
function delBud(id){if(!isAdmin()){showToast('권한 없음','error');return;}if(confirm('삭제하시겠습니까?')){budget=budget.filter(b=>b.id!==id);sv('budget',budget);rtBud();}}
function delDoc(id){if(confirm('삭제하시겠습니까?')){dokuments=dokuments.filter(d=>d.id!==id);sv('dokuments',dokuments);rtPersonal();}}
function delRpt(id){if(confirm('삭제하시겠습니까?')){reports=reports.filter(r=>r.id!==id);sv('reports',reports);rtPersonal();}}
function delEvt(id){if(confirm('삭제하시겠습니까?')){events=events.filter(e=>e.id!==id);sv('events',events);rtSched();}}
function delWkItem(key,unit,sec,id){weeklyData[key][unit][sec]=weeklyData[key][unit][sec].filter(i=>i.id!==id);sv('weeklyData',weeklyData);rtPersonal();}

    go('task');
