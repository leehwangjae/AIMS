<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RISE 미래인재개발팀 성과관리시스템</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-bg-secondary: #f8f9fa;
      --color-text-primary: #1a1a2e;
      --color-text-secondary: #6b7280;
      --color-border: #e5e7eb;
      --color-border-secondary: #d1d5db;
      --color-border-tertiary: #e5e7eb;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f9fa;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      --border-radius-sm: 4px;
      --border-radius-md: 6px;
      --border-radius-lg: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0f1117;
        --color-bg-secondary: #1a1d27;
        --color-text-primary: #e8eaf0;
        --color-text-secondary: #9ca3af;
        --color-border: #2d3140;
        --color-border-secondary: #374151;
        --color-border-tertiary: #2d3140;
        --color-background-primary: #1a1d27;
        --color-background-secondary: #24283a;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
    }
    /* TOP BAR */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--color-background-primary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 52px;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; }
    .topbar-logo {
      width: 28px; height: 28px; border-radius: 7px;
      background: linear-gradient(135deg, #185fa5, #0f6e56);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 700;
    }
    .topbar-title { font-size: 14px; font-weight: 600; color: var(--color-text-primary); }
    .topbar-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 1px; }
    .topbar-right { font-size: 11px; color: var(--color-text-secondary); }
    /* MAIN */
    .main { max-width: 1200px; margin: 0 auto; padding: 20px 24px 60px; }
    /* NAV */
    .nav { display: flex; gap: 1px; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.3rem; overflow-x: auto; }
    .nb { padding: 8px 13px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 12.5px; color: var(--color-text-secondary); font-family: var(--font-sans); white-space: nowrap; transition: color .15s; }
    .nb:hover { color: var(--color-text-primary); }
    .nb.on { color: var(--color-text-primary); border-bottom-color: #185fa5; font-weight: 500; }
    .sub-nav { display: flex; gap: 4px; margin-bottom: 12px; }
    .snb { padding: 5px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: none; cursor: pointer; font-size: 11.5px; color: var(--color-text-secondary); font-family: var(--font-sans); }
    .snb.on { background: #185fa5; color: #fff; border-color: #185fa5; }
    /* KPI */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin-bottom: 1rem; }
    @media (max-width: 600px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } }
    .kpi { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; border: 0.5px solid var(--color-border-tertiary); }
    .kv { font-size: 20px; font-weight: 500; margin-bottom: 2px; }
    .kl { font-size: 11px; color: var(--color-text-secondary); }
    /* TOOLBAR */
    .tb { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 6px; flex-wrap: wrap; }
    .frow { display: flex; gap: 3px; flex-wrap: wrap; }
    .fb { padding: 4px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: none; cursor: pointer; font-size: 11.5px; color: var(--color-text-secondary); font-family: var(--font-sans); transition: all .15s; }
    .fb:hover { border-color: #185fa5; color: #185fa5; }
    .fb.on { background: #185fa5; color: #fff; border-color: #185fa5; }
    .ab { padding: 7px 13px; background: #185fa5; color: #fff; border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 11.5px; font-family: var(--font-sans); display: inline-flex; align-items: center; gap: 4px; transition: background .15s; }
    .ab:hover { background: #1470bc; }
    .abs { padding: 3px 8px; background: none; color: #185fa5; border: 0.5px solid #185fa5; border-radius: var(--border-radius-md); cursor: pointer; font-size: 10.5px; font-family: var(--font-sans); display: inline-flex; align-items: center; gap: 2px; }
    /* CARD */
    .sc { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: .9rem; }
    .sc.ov { overflow: hidden; }
    .sch { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .sct { font-size: 13px; font-weight: 500; }
    .scb { padding: 10px 14px; }
    /* TABLE */
    .tbl { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    .tbl th { padding: 7px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); font-weight: 500; font-size: 11px; text-align: left; }
    .tbl td { padding: 6px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--color-background-secondary); }
    /* BADGE */
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 500; white-space: nowrap; }
    .bd { background: #eaf3de; color: #3b6d11; }
    .bi { background: #e6f1fb; color: #185fa5; }
    .bl { background: #fcebeb; color: #a32d2d; }
    .bp { background: #faeeda; color: #854f0b; }
    .bq { background: #eeedfe; color: #3c3489; }
    .bql { background: #e1f5ee; color: #085041; }
    .ba { background: #f1efe8; color: #5f5e5a; }
    /* PROGRESS */
    .pw { display: flex; align-items: center; gap: 5px; }
    .pb { flex: 1; height: 5px; background: var(--color-border-tertiary); border-radius: 3px; overflow: hidden; }
    .pf { height: 100%; border-radius: 3px; }
    .pt { font-size: 11px; color: var(--color-text-secondary); min-width: 26px; text-align: right; }
    .minibar { height: 5px; background: var(--color-border-tertiary); border-radius: 3px; overflow: hidden; margin: 3px 0; }
    .mbf { height: 100%; border-radius: 3px; }
    /* BUTTONS */
    .eb { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 13px; padding: 2px 3px; }
    .eb:hover { color: #185fa5; }
    .db { background: none; border: none; cursor: pointer; color: #c0c4cc; font-size: 13px; padding: 2px 3px; }
    .db:hover { color: #a32d2d; }
    /* BUDGET SPLIT */
    .bsplit { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    @media (max-width: 600px) { .bsplit { grid-template-columns: 1fr; } }
    .bsc { border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); overflow: hidden; }
    .bscm { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .bscmv { font-size: 14px; font-weight: 500; text-align: center; }
    .bscml { font-size: 10.5px; color: var(--color-text-secondary); text-align: center; }
    /* CALENDAR */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: .5rem; }
    .cal-hdr { padding: 6px; text-align: center; font-size: 11px; font-weight: 500; color: var(--color-text-secondary); }
    .cal-cell { min-height: 75px; padding: 5px; border: 0.5px solid var(--color-border-tertiary); border-radius: 5px; background: var(--color-background-primary); }
    .cal-cell.other { background: var(--color-background-secondary); opacity: .5; }
    .cal-cell.today { border-color: #185fa5; border-width: 1.5px; }
    .cal-dn { font-size: 11px; font-weight: 400; color: var(--color-text-secondary); margin-bottom: 3px; }
    .cal-dn.today { color: #185fa5; font-weight: 600; }
    .cal-dot { font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* WEEK NAV */
    .wk-nav { display: flex; align-items: center; gap: 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 10px 14px; margin-bottom: 1rem; border: 0.5px solid var(--color-border-tertiary); }
    .wk-label { flex: 1; text-align: center; font-size: 13px; font-weight: 500; }
    .wnb { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: 6px; cursor: pointer; padding: 4px 11px; font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-sans); }
    .wnb:hover { border-color: #185fa5; color: #185fa5; }
    .wk-day { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 7px; overflow: hidden; }
    .wk-day-hd { padding: 7px 13px; display: flex; justify-content: space-between; align-items: center; }
    .wk-item { display: flex; align-items: center; gap: 7px; padding: 6px 13px; border-top: 0.5px solid var(--color-border-tertiary); font-size: 12px; }
    .wk-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    /* WEEKLY REPORT */
    .wu-block { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: .7rem; }
    .wu-hd { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .wu-body { display: flex; padding: 10px 14px; gap: 0; }
    .wu-half { flex: 1; min-width: 0; }
    .wu-htitle { font-size: 11px; font-weight: 500; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .wu-item { display: flex; gap: 6px; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: flex-start; }
    .wu-item:last-child { border-bottom: none; }
    .wu-div { width: 0.5px; background: var(--color-border-tertiary); margin: 0 10px; align-self: stretch; }
    .wu-empty { font-size: 11px; color: var(--color-text-secondary); font-style: italic; padding: 8px 0; }
    /* REPORT */
    .rs-done { background: #eaf3de; color: #3b6d11; }
    .rs-ing { background: #e6f1fb; color: #185fa5; }
    .rs-fb { background: #faeeda; color: #854f0b; }
    /* MODAL */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.55); z-index: 1000; align-items: center; justify-content: center; }
    .modal-bg.on { display: flex; }
    .modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); width: 490px; max-width: 97vw; border: 0.5px solid var(--color-border-secondary); max-height: 93vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
    .mhd { display: flex; justify-content: space-between; align-items: center; padding: 13px 17px; border-bottom: 0.5px solid var(--color-border-tertiary); position: sticky; top: 0; background: var(--color-background-primary); z-index: 1; }
    .mhd span { font-size: 13.5px; font-weight: 500; }
    .mhd button { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--color-text-secondary); line-height: 1; }
    .mbd { padding: 15px 17px; }
    .mft { padding: 11px 17px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--color-background-primary); }
    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .fgf { grid-column: 1/-1; }
    .fl { font-size: 11.5px; color: var(--color-text-secondary); margin-bottom: 4px; display: block; font-weight: 500; }
    .fi { width: 100%; padding: 7px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 12.5px; font-family: var(--font-sans); background: var(--color-background-secondary); color: var(--color-text-primary); }
    .fi:focus { outline: none; border-color: #185fa5; box-shadow: 0 0 0 2px #185fa520; }
    .mcx { padding: 7px 13px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 12px; font-family: var(--font-sans); color: var(--color-text-secondary); }
    .mok { padding: 7px 16px; background: #185fa5; border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 12px; font-family: var(--font-sans); color: #fff; }
    .mok:hover { background: #1470bc; }
    /* TOAST */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 9999; transition: transform .3s ease; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 3px; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">R</div>
    <div>
      <div class="topbar-title">RISE 미래인재개발팀 성과관리시스템</div>
      <div class="topbar-sub">인천대학교 · 단위과제 1-1 · 1-2 · 1-3 · 2-1 AI</div>
    </div>
  </div>
  <div class="topbar-right" id="dateLbl"></div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="nav">
    <button class="nb on" onclick="go('task')">📋 업무추진</button>
    <button class="nb" onclick="go('ind')">🎯 성과지표</button>
    <button class="nb" onclick="go('bud')">💰 예산관리</button>
    <button class="nb" onclick="go('personal')">📁 개인업무</button>
    <button class="nb" onclick="go('schedule')">📅 사업일정</button>
    <button class="nb" onclick="go('report')">📊 실적보고</button>
  </div>
  <div id="tab-task"></div>
  <div id="tab-ind" style="display:none"></div>
  <div id="tab-bud" style="display:none"></div>
  <div id="tab-personal" style="display:none"></div>
  <div id="tab-schedule" style="display:none"></div>
  <div id="tab-report" style="display:none"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ── MODALS ─────────────────────────────────── -->
<!-- Task -->
<div class="modal-bg" id="mTask"><div class="modal">
  <div class="mhd"><span id="mTaskT">업무 추가</span><button onclick="cm('mTask')">×</button></div>
  <div class="mbd"><div class="fg">
    <div><label class="fl">단위사업</label><select class="fi" id="t_unit" onchange="updInd()"><option>1-1</option><option>1-2</option><option>1-3</option><option value="2-1">2-1 AI</option></select></div>
    <div><label class="fl">분야</label><select class="fi" id="t_field"><option>바이오</option><option>반도체</option><option>물류</option><option>스마트모빌리티</option><option>AI</option><option>창업</option><option>공통</option></select></div>
    <div class="fgf"><label class="fl">업무명</label><input class="fi" id="t_title" type="text" placeholder="업무 내용을 입력하세요"></div>
    <div><label class="fl">담당자</label><input class="fi" id="t_who" placeholder="홍길동"></div>
    <div><label class="fl">마감일</label><input class="fi" id="t_due" type="date"></div>
    <div><label class="fl">상태</label><select class="fi" id="t_stat"><option>예정</option><option>진행중</option><option>완료</option><option>지연</option></select></div>
    <div><label class="fl">진행률 (%)</label><input class="fi" id="t_prog" type="number" min="0" max="100" value="0"></div>
    <div><label class="fl">업무구분</label><select class="fi" id="t_type" onchange="togInd()"><option value="일반행정">일반행정</option><option value="정량지표">정량지표</option><option value="정성지표">정성지표</option></select></div>
    <div class="fgf" id="indWrap" style="display:none"><div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 11px"><label class="fl">연계 성과지표</label><select class="fi" id="t_ind"><option value="">-- 선택 --</option></select></div></div>
  </div></div>
  <div class="mft"><button class="mcx" onclick="cm('mTask')">취소</button><button class="mok" onclick="svTask()">저장</button></div>
</div></div>

<!-- Indicator -->
<div class="modal-bg" id="mInd"><div class="modal" style="width:380px">
  <div class="mhd"><span id="mIndT">실적 입력</span><button onclick="cm('mInd')">×</button></div>
  <div class="mbd">
    <div id="mIndInfo" style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary)"></div>
    <div class="fg"><div><label class="fl">2026년 목표</label><input class="fi" id="i_tgt" type="number"></div><div><label class="fl">2026년 실적</label><input class="fi" id="i_act" type="number"></div></div>
  </div>
  <div class="mft"><button class="mcx" onclick="cm('mInd')">취소</button><button class="mok" onclick="svInd()">저장</button></div>
</div></div>

<!-- Budget -->
<div class="modal-bg" id="mBud"><div class="modal" style="width:450px">
  <div class="mhd"><span id="mBudT">예산 항목 추가</span><button onclick="cm('mBud')">×</button></div>
  <div class="mbd"><div class="fg">
    <div><label class="fl">단위사업</label><select class="fi" id="b_unit"><option>1-1</option><option>1-2</option><option>1-3</option><option value="2-1">2-1 AI</option></select></div>
    <div><label class="fl">사업비 구분</label><select class="fi" id="b_btype"><option value="이월">이월사업비</option><option value="연차">연차사업비</option></select></div>
    <div><label class="fl">비목</label><select class="fi" id="b_cat"><option>인건비</option><option>연구활동비</option><option>교육훈련비</option><option>장비재료비</option><option>간접비</option><option>기타</option></select></div>
    <div><label class="fl">항목명</label><input class="fi" id="b_name"></div>
    <div><label class="fl">편성액 (천원)</label><input class="fi" id="b_al" type="number" placeholder="0"></div>
    <div><label class="fl">집행액 (천원)</label><input class="fi" id="b_ex" type="number" placeholder="0"></div>
  </div></div>
  <div class="mft"><button class="mcx" onclick="cm('mBud')">취소</button><button class="mok" onclick="svBud()">저장</button></div>
</div></div>

<!-- Document -->
<div class="modal-bg" id="mDoc"><div class="modal" style="width:440px">
  <div class="mhd"><span id="mDocT">기안 추가</span><button onclick="cm('mDoc')">×</button></div>
  <div class="mbd"><div class="fg">
    <div><label class="fl">기안 유형</label><select class="fi" id="d_type"><option>사업계획안</option><option>결과보고</option><option>일반지출</option><option>문서관리</option><option>기타</option></select></div>
    <div><label class="fl">단위사업</label><select class="fi" id="d_unit"><option>전체</option><option>1-1</option><option>1-2</option><option>1-3</option><option value="2-1">2-1 AI</option></select></div>
    <div class="fgf"><label class="fl">제목</label><input class="fi" id="d_title" placeholder="기안 제목"></div>
    <div><label class="fl">기안일</label><input class="fi" id="d_date" type="date"></div>
    <div><label class="fl">담당자</label><input class="fi" id="d_who"></div>
    <div><label class="fl">상태</label><select class="fi" id="d_stat"><option>작성중</option><option>검토중</option><option>결재완료</option></select></div>
  </div></div>
  <div class="mft"><button class="mcx" onclick="cm('mDoc')">취소</button><button class="mok" onclick="svDoc()">저장</button></div>
</div></div>

<!-- Report -->
<div class="modal-bg" id="mRpt"><div class="modal" style="width:440px">

function rtSched(){

  </div>`;

function getAllItems(){
  const items=[];
  tasks.forEach(t=>items.push({date:t.due,label:t.title,unit:t.unit,color:UC[t.unit]||'#185fa5',src:'task'}));
  reports.forEach(r=>items.push({date:r.due,label:r.rtype+': '+r.title,unit:'전체',color:'#534ab7',src:'report'}));
  events.forEach(e=>items.push({date:e.date,label:e.title,unit:e.unit,color:UC[e.unit]||'#185fa5',eid:e.id,src:'event'}));
  return items;
}

function rtWeekCal(){
  const monDate=new Date(BASE_MON);monDate.setDate(BASE_MON.getDate()+weekOff*7);
  const days=['월','화','수','목','금','토','일'];
  const allItems=getAllItems();const today='2026-05-27';
  let h=`<div class="wk-nav">
    <button class="wnb" onclick="weekOff--;rtSched()">← 이전</button>
    <span class="wk-label">${getWkLabel(weekOff)}</span>
    <button class="wnb" onclick="weekOff++;rtSched()">다음 →</button>
  </div>`;
  for(let d=0;d<7;d++){
    const dt=new Date(monDate);dt.setDate(monDate.getDate()+d);
    const ds2=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    const dItems=allItems.filter(i=>i.date===ds2);const isT=ds2===today;
    h+=`<div class="wk-day"><div class="wk-day-hd" style="background:${isT?'#185fa510':'var(--color-background-secondary)'}">
      <span style="font-size:12.5px;font-weight:${isT?'600':'400'};color:${isT?'#185fa5':'var(--color-text-primary)'}">${days[d]} ${dt.getMonth()+1}/${dt.getDate()}</span>
      ${isT?'<span style="font-size:10px;background:#185fa5;color:#fff;padding:1px 7px;border-radius:10px">오늘</span>':''}
      <span style="font-size:11px;color:var(--color-text-secondary)">${dItems.length}건</span>
    </div>`;
    if(!dItems.length)h+=`<div style="padding:7px 13px;font-size:11.5px;color:var(--color-text-secondary);font-style:italic">일정 없음</div>`;
    dItems.forEach(it=>h+=`<div class="wk-item"><span class="wk-dot" style="background:${it.color}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${it.label}">${it.label}</span><span style="font-size:10.5px;color:${it.color};background:${it.color}18;padding:1px 6px;border-radius:3px">${it.unit}</span>${it.src==='event'?`<button class="db" onclick="delEvt(${it.eid})"><i class="ti ti-trash"></i></button>`:''}</div>`);
    h+=`</div>`;
  }
  return h;
}

function rtMonthCal(){
  const bd=new Date(2026,4+monthOff,1);
  const yr=bd.getFullYear(),mo=bd.getMonth();
  const mNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const firstDay=new Date(yr,mo,1).getDay(),daysInMo=new Date(yr,mo+1,0).getDate();
  const allItems=getAllItems();const today='2026-05-27';
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button class="wnb" onclick="monthOff--;rtSched()">← 이전</button>
    <span style="font-size:14px;font-weight:500">${yr}년 ${mNames[mo]}</span>
    <button class="wnb" onclick="monthOff++;rtSched()">다음 →</button>
  </div>
  <div class="cal-grid">`;
  ['일','월','화','수','목','금','토'].forEach(d=>h+=`<div class="cal-hdr">${d}</div>`);
  let cells=[];for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMo;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  cells.forEach(d=>{
    if(!d){h+=`<div class="cal-cell other"></div>`;return;}
    const ds2=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const di=allItems.filter(i=>i.date===ds2);const isT=ds2===today;
    h+=`<div class="cal-cell${isT?' today':''}">
      <div class="cal-dn${isT?' today':''}">${d}</div>`;
    di.slice(0,3).forEach(it=>h+=`<div class="cal-dot" style="background:${it.color}18;color:${it.color}" title="${it.label}">${it.label}</div>`);
    if(di.length>3)h+=`<div style="font-size:9.5px;color:var(--color-text-secondary);padding:1px 3px">+${di.length-3}건</div>`;
    h+=`</div>`;
  });
  h+=`</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:11.5px;color:var(--color-text-secondary)">
    ${UNITS.map(u=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:${UC[u]};display:inline-block"></span>${u} ${UN[u]}</span>`).join('')}
  </div>`;
  return h;
}

        <td style="text-align:right;font-size:11.5px;color:var(--color-text-secondary)">${fmt(b.al-b.ex)}</td>
        <td><span style="font-size:11.5px;font-weight:500;color:${pc(r)}">${r}%</span></td>
        <td><div class="minibar"><div class="mbf" style="width:${r}%;background:${pc(r)}"></div></div></td></tr>`;
      });
      h+=`<tr style="background:${tbg}"><td colspan="2" style="font-size:11.5px;font-weight:500;color:${tc}">소계</td><td style="text-align:right;font-size:11.5px;font-weight:500;color:${tc}">${fmt(sa)}</td><td style="text-align:right;font-size:11.5px;font-weight:500;color:${tc}">${fmt(se)}</td><td style="text-align:right;font-size:11.5px;font-weight:500;color:${tc}">${fmt(sa-se)}</td><td colspan="2" style="font-size:11.5px;font-weight:500;color:${tc}">${sr}%</td></tr></tbody></table>`;
    });
    h+=`</div></div>`;
  });
  document.getElementById('tab-report').innerHTML=h;
}

// ═══════════════════════════════════════════════════
//  MODAL OPENERS
// ═══════════════════════════════════════════════════
function opTask(id){
  editingTask=id||null;document.getElementById('mTaskT').textContent=id?'업무 수정':'업무 추가';
  if(id){const t=tasks.find(x=>x.id===id);if(t){document.getElementById('t_unit').value=t.unit;document.getElementById('t_field').value=t.field;document.getElementById('t_title').value=t.title;document.getElementById('t_who').value=t.who;document.getElementById('t_due').value=t.due;document.getElementById('t_stat').value=t.stat;document.getElementById('t_prog').value=t.prog;document.getElementById('t_type').value=t.type||'일반행정';togInd();if(t.type==='정량지표'){updInd();setTimeout(()=>document.getElementById('t_ind').value=t.iid||'',10);}}}
  else{['t_title','t_who','t_due'].forEach(i=>document.getElementById(i).value='');document.getElementById('t_prog').value=0;document.getElementById('t_stat').value='예정';document.getElementById('t_type').value='일반행정';document.getElementById('indWrap').style.display='none';}
  om('mTask');
}
function togInd(){const t=document.getElementById('t_type').value;document.getElementById('indWrap').style.display=t==='정량지표'?'block':'none';if(t==='정량지표')updInd();}
function updInd(){const u=document.getElementById('t_unit').value;const s=document.getElementById('t_ind');s.innerHTML='<option value="">-- 선택 --</option>'+indicators.filter(i=>i.unit===u).map(i=>`<option value="${i.id}">${i.name} (${i.ul})</option>`).join('');}
function opInd(id){editingInd=id;const i=indicators.find(x=>x.id===id);if(!i)return;document.getElementById('mIndT').textContent=i.name;document.getElementById('mIndInfo').innerHTML=`<strong>${i.unit} · ${i.name}</strong><br>2025 실적: ${i.a25>0?fmt(i.a25)+' '+i.ul:'-'}`;document.getElementById('i_tgt').value=i.t26||'';document.getElementById('i_act').value=i.a26||'';om('mInd');}
function opBud(id){editingBud=id||null;document.getElementById('mBudT').textContent=id?'예산 항목 수정':'예산 항목 추가';if(id){const b=budget.find(x=>x.id===id);if(b){document.getElementById('b_unit').value=b.unit;document.getElementById('b_btype').value=b.btype;document.getElementById('b_cat').value=b.cat;document.getElementById('b_name').value=b.name;document.getElementById('b_al').value=b.al;document.getElementById('b_ex').value=b.ex;}}else{['b_name','b_al','b_ex'].forEach(i=>document.getElementById(i).value='');}om('mBud');}
function opDoc(id){editingDoc=id||null;document.getElementById('mDocT').textContent=id?'기안 수정':'기안 추가';if(id){const d=dokuments.find(x=>x.id===id);if(d){document.getElementById('d_type').value=d.dtype;document.getElementById('d_unit').value=d.unit;document.getElementById('d_title').value=d.title;document.getElementById('d_date').value=d.date;document.getElementById('d_who').value=d.who;document.getElementById('d_stat').value=d.stat;}}else{['d_title','d_date','d_who'].forEach(i=>document.getElementById(i).value='');}om('mDoc');}
function opRpt(id){editingRpt=id||null;document.getElementById('mRptT').textContent=id?'보고서 수정':'보고서 추가';if(id){const r=reports.find(x=>x.id===id);if(r){document.getElementById('r_type').value=r.rtype;document.getElementById('r_wk').value=r.wkKey||'';document.getElementById('r_title').value=r.title;document.getElementById('r_due').value=r.due;document.getElementById('r_who').value=r.who;document.getElementById('r_stat').value=r.stat;}}else{['r_title','r_due','r_who','r_wk'].forEach(i=>document.getElementById(i).value='');}om('mRpt');}
function opEvt(id){editingEvt=id||null;document.getElementById('mEvtT').textContent=id?'일정 수정':'일정 추가';if(id){const e=events.find(x=>x.id===id);if(e){document.getElementById('e_title').value=e.title;document.getElementById('e_date').value=e.date;document.getElementById('e_unit').value=e.unit;document.getElementById('e_etype').value=e.etype;document.getElementById('e_who').value=e.who;document.getElementById('e_memo').value=e.memo||'';}}else{['e_title','e_date','e_who','e_memo'].forEach(i=>document.getElementById(i).value='');}om('mEvt');}
function opWkEdit(unit,sec,id){
  editingWk=id||null;
  if(unit)document.getElementById('wk_unit').value=unit;
  if(sec)document.getElementById('wk_sec').value=sec;
  if(id&&unit&&sec){const key=getWkKey(weekOff);const item=weeklyData[key]?.[unit]?.[sec]?.find(i=>i.id===id);if(item){document.getElementById('wk_txt').value=item.text;document.getElementById('wk_who').value=item.who;document.getElementById('wk_type').value=item.type||'일반행정';}}
  else{['wk_txt','wk_who'].forEach(i=>document.getElementById(i).value='');}
  om('mWk');
}

// ═══════════════════════════════════════════════════
//  SAVERS
// ═══════════════════════════════════════════════════
function svTask(){
  const unit=document.getElementById('t_unit').value,field=document.getElementById('t_field').value,title=document.getElementById('t_title').value.trim(),who=document.getElementById('t_who').value.trim(),due=document.getElementById('t_due').value,stat=document.getElementById('t_stat').value,prog=parseInt(document.getElementById('t_prog').value)||0,type=document.getElementById('t_type').value,iid=type==='정량지표'?document.getElementById('t_ind').value:'';
  if(!title||!who)return;
  if(editingTask){const idx=tasks.findIndex(t=>t.id===editingTask);if(idx>-1)tasks[idx]={...tasks[idx],unit,field,title,who,due,stat,prog,type,iid};}
  else tasks.push({id:Date.now(),unit,field,title,who,due,stat,prog,type,iid});
  save('tasks',tasks);cm('mTask');rtTask();showToast('저장되었습니다');
}
function svInd(){const idx=indicators.findIndex(i=>i.id===editingInd);if(idx>-1){indicators[idx].t26=parseFloat(document.getElementById('i_tgt').value)||0;indicators[idx].a26=parseFloat(document.getElementById('i_act').value)||0;}save('indicators',indicators);cm('mInd');rtInd();showToast('실적이 저장되었습니다');}
function svBud(){const unit=document.getElementById('b_unit').value,btype=document.getElementById('b_btype').value,cat=document.getElementById('b_cat').value,name=document.getElementById('b_name').value.trim(),al=parseInt(document.getElementById('b_al').value)||0,ex=parseInt(document.getElementById('b_ex').value)||0;if(!name)return;if(editingBud){const idx=budget.findIndex(b=>b.id===editingBud);if(idx>-1)budget[idx]={...budget[idx],unit,btype,cat,name,al,ex};}else budget.push({id:Date.now(),unit,btype,cat,name,al,ex});save('budget',budget);cm('mBud');rtBud();showToast('저장되었습니다');}
function svDoc(){const dtype=document.getElementById('d_type').value,unit=document.getElementById('d_unit').value,title=document.getElementById('d_title').value.trim(),date=document.getElementById('d_date').value,who=document.getElementById('d_who').value.trim(),stat=document.getElementById('d_stat').value;if(!title)return;if(editingDoc){const idx=dokuments.findIndex(d=>d.id===editingDoc);if(idx>-1)dokuments[idx]={...dokuments[idx],dtype,unit,title,date,who,stat};}else dokuments.push({id:Date.now(),dtype,unit,title,date,who,stat});save('dokuments',dokuments);cm('mDoc');rtPersonal();showToast('저장되었습니다');}
function svRpt(){const rtype=document.getElementById('r_type').value,wkKey=document.getElementById('r_wk').value.trim(),title=document.getElementById('r_title').value.trim(),due=document.getElementById('r_due').value,who=document.getElementById('r_who').value.trim(),stat=document.getElementById('r_stat').value;if(!title)return;if(editingRpt){const idx=reports.findIndex(r=>r.id===editingRpt);if(idx>-1)reports[idx]={...reports[idx],rtype,wkKey,title,due,who,stat};}else reports.push({id:Date.now(),rtype,wkKey,title,due,who,stat});save('reports',reports);cm('mRpt');rtPersonal();showToast('저장되었습니다');}
function svEvt(){const title=document.getElementById('e_title').value.trim(),date=document.getElementById('e_date').value,unit=document.getElementById('e_unit').value,etype=document.getElementById('e_etype').value,who=document.getElementById('e_who').value.trim(),memo=document.getElementById('e_memo').value.trim();if(!title||!date)return;if(editingEvt){const idx=events.findIndex(e=>e.id===editingEvt);if(idx>-1)events[idx]={...events[idx],title,date,unit,etype,who,memo};}else events.push({id:Date.now(),title,date,unit,etype,who,memo});save('events',events);cm('mEvt');rtSched();showToast('일정이 저장되었습니다');}
function svWk(){const key=getWkKey(weekOff);ensureWk(key);const unit=document.getElementById('wk_unit').value,sec=document.getElementById('wk_sec').value,text=document.getElementById('wk_txt').value.trim(),who=document.getElementById('wk_who').value.trim(),type=document.getElementById('wk_type').value;if(!text)return;if(editingWk){const idx=weeklyData[key][unit][sec].findIndex(i=>i.id===editingWk);if(idx>-1)weeklyData[key][unit][sec][idx]={...weeklyData[key][unit][sec][idx],text,who,type};}else weeklyData[key][unit][sec].push({id:Date.now(),text,who,type});save('weeklyData',weeklyData);cm('mWk');rtPersonal();showToast('저장되었습니다');}

// ═══════════════════════════════════════════════════
//  DELETERS
// ═══════════════════════════════════════════════════
function delTask(id){if(confirm('삭제하시겠습니까?')){tasks=tasks.filter(t=>t.id!==id);save('tasks',tasks);rtTask();}}
function delBud(id){if(confirm('삭제하시겠습니까?')){budget=budget.filter(b=>b.id!==id);save('budget',budget);rtBud();}}
function delDoc(id){if(confirm('삭제하시겠습니까?')){dokuments=dokuments.filter(d=>d.id!==id);save('dokuments',dokuments);rtPersonal();}}
function delRpt(id){if(confirm('삭제하시겠습니까?')){reports=reports.filter(r=>r.id!==id);save('reports',reports);rtPersonal();}}
function delEvt(id){if(confirm('삭제하시겠습니까?')){events=events.filter(e=>e.id!==id);save('events',events);rtSched();}}
function delWkItem(key,unit,sec,id){weeklyData[key][unit][sec]=weeklyData[key][unit][sec].filter(i=>i.id!==id);save('weeklyData',weeklyData);rtPersonal();}

document.getElementById('dateLbl').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
go('task');
</script>
